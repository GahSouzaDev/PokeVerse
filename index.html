                        panel.innerHTML = '';
                        panel.appendChild(Utils.el('div', {
                            style: 'font-weight:700;margin-bottom:var(--sp-3);font-family:var(--font-display)'
                        }, ['Seu time (' + team.length + '/' + maxSlots + ')']));
                        for (let i = 0; i < maxSlots; i++) {
                            const slot = Utils.el('div', { class: 'team-slot' });
                            const num = Utils.el('span', { class: 'slot-num' }, ['#' + (i + 1)]);
                            slot.appendChild(num);
                            if (i < team.length) {
                                const p = team[i];
                                const sprite = p.sprites?.front_default || '';
                                const img = Utils.el('img', { class: 'slot-sprite', src: sprite, alt: p.name });
                                const name = Utils.el('span', { class: 'slot-name' }, [Utils.translatePokemonName(p
                                    .name)]);
                                const rm = Utils.el('button', { class: 'slot-remove' }, ['✕']);
                                rm.onclick = () => { team.splice(i, 1);
                                    renderTeam() };
                                slot.append(img, name, rm);
                            } else {
                                const addBtn = Utils.el('button', { class: 'btn btn-sm btn-ghost',
                                    style: 'flex:1' }, ['+ Adicionar']);
                                addBtn.onclick = () => this._pickPokemonForTeam(team, renderTeam);
                                slot.appendChild(addBtn);
                            }
                            panel.appendChild(slot);
                        }
                        if (team.length >= 3) {
                            const aiBtn = Utils.el('button', { class: 'btn btn-gold',
                                style: 'margin-top:var(--sp-4);width:100%;justify-content:center' }, [
                                '🤖 Sugestão da IA']);
                            aiBtn.onclick = () => this._teamAISuggestion(team, panel);
                            panel.appendChild(aiBtn);
                        }
                        if (team.length) {
                            const analysis = Utils.el('div', {
                                style: 'margin-top:var(--sp-4);padding:var(--sp-3);background:var(--bg-2);border-radius:var(--radius-md);font-size:.78rem;color:var(--text-1)'
                            });
                            const types = team.flatMap(p => p.types.map(t => t.type.name));
                            const unique = [...new Set(types)];
                            analysis.innerHTML = '<b style="color:var(--text-0)">Análise rápida:</b> ' + team.length +
                                ' Pokémon · ' + unique.length + ' tipos únicos: ' + unique.map(t =>
                                    '<span class="type-badge type-' + t + '">' + Utils.translateType(t) +
                                    '</span>').join(' ');
                            panel.appendChild(analysis);
                        }
                    };
                    renderTeam();
                },

                async _pickPokemonForTeam(team, renderFn) {
                    const overlay = document.getElementById('searchOverlay');
                    const input = document.getElementById('searchInput');
                    const results = document.getElementById('searchResults');
                    overlay.classList.add('open');
                    input.value = '';
                    results.innerHTML = '';
                    input.focus();
                    const doSearch = async () => {
                        const q = input.value.trim();
                        if (!q) { results.innerHTML = ''; return }
                        results.innerHTML =
                            '<div style="padding:var(--sp-3);color:var(--text-2)">Buscando…</div>';
                        try {
                            const list = await Api.search(q);
                            results.innerHTML = '';
                            if (!list.length) { results.appendChild(Utils.el('div', { style: 'padding:var(--sp-3);color:var(--text-2)' },
                                    ['Nenhum Pokémon encontrado.'])); return }
                            for (const p of list) {
                                const item = Utils.el('div', { class: 'sr-item' });
                                const img = Utils.el('img', { src: p.sprites?.front_default || '',
                                alt: p.name });
                                const name = Utils.el('span', { class: 'sr-name' }, [Utils.translatePokemonName(p
                                    .name)]);
                                const meta = Utils.el('span', { class: 'sr-meta' }, [Utils.formatId(p
                                    .id)]);
                                item.onclick = () => {
                                    if (team.length < 6 && !team.some(x => x.id === p.id)) {
                                        team.push(p);
                                        overlay.classList.remove('open');
                                        renderFn();
                                        Toast.show('Adicionado!', Utils.translatePokemonName(p.name));
                                    } else {
                                        Toast.show('Ops', 'Time cheio ou Pokémon já adicionado.', { duration: 2000 });
                                    }
                                };
                                item.append(img, name, meta);
                                results.appendChild(item);
                            }
                        } catch (e) {
                            results.innerHTML = '';
                            results.appendChild(Utils.el('div', { style: 'padding:var(--sp-3);color:var(--text-2)' },
                                ['Erro na busca.']));
                        }
                    };
                    const handler = Utils.debounce(doSearch, 300);
                    input.addEventListener('input', handler);
                    const closeHandler = () => {
                        overlay.classList.remove('open');
                        input.removeEventListener('input', handler);
                        document.getElementById('searchCloseBtn').removeEventListener('click', closeHandler);
                    };
                    document.getElementById('searchCloseBtn').addEventListener('click', closeHandler);
                    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeHandler() }, { once: true });
                },

                _teamAISuggestion(team, panel) {
                    const types = team.flatMap(p => p.types.map(t => t.type.name));
                    const typeCount = {};
                    types.forEach(t => { typeCount[t] = (typeCount[t] || 0) + 1 });
                    const missing = ['fire', 'water', 'grass', 'electric', 'fighting', 'ground', 'flying', 'psychic',
                        'dark', 'steel', 'fairy'
                    ].filter(t => !typeCount[t]);
                    let suggestion = '🤖 ';
                    if (missing.length) {
                        const rec = missing.slice(0, 2);
                        suggestion +=
                            `Seu time não tem Pokémon dos tipos ${rec.map(t=>Utils.translateType(t)).join(' ou ')}. Considere adicionar um para melhor cobertura. `;
                    } else {
                        suggestion += 'Seu time tem boa cobertura de tipos! ';
                    }
                    if (team.length < 6) suggestion += `Você tem ${team.length}/6 Pokémon. Adicione mais.`;
                    else suggestion += 'Time completo! Analise as fraquezas na Calculadora de Tipos.';
                    const box = Utils.el('div', {
                        style: 'margin-top:var(--sp-3);padding:var(--sp-3);background:var(--gold-bg);border-radius:var(--radius-md);border-left:3px solid var(--gold);font-size:.82rem;color:var(--text-0)'
                    }, [suggestion]);
                    panel.appendChild(box);
                    Toast.show('💡 Sugestão da IA', suggestion, { duration: 6000 });
                },

                // ─── BATTLE SIMULATOR ──────────────────────────────────
                async renderBattle() {
                    const main = this.main();
                    main.innerHTML = '';
                    main.appendChild(Utils.el('div', { class: 'view-head' }, [
                        Utils.el('div', {}, [
                            Utils.el('h1', { class: 'view-title', html: 'Simulador de <em>Batalha</em> AI' }),
                            Utils.el('p', { class: 'view-sub' }, ['Escolha dois Pokémon e veja a previsão da IA'])
                        ])
                    ]));
                    const panel = Utils.el('div', { class: 'panel' });
                    main.appendChild(panel);
                    const row = Utils.el('div', { class: 'filter-row' });
                    const selA = document.createElement('select');
                    selA.className = 'select';
                    selA.style.minWidth = '160px';
                    selA.innerHTML = '<option value="">Pokémon 1…</option>';
                    const selB = document.createElement('select');
                    selB.className = 'select';
                    selB.style.minWidth = '160px';
                    selB.innerHTML = '<option value="">Pokémon 2…</option>';
                    const fightBtn = Utils.el('button', { class: 'btn btn-gold btn-sm' }, ['⚔️ Batalhar!']);
                    row.append(Utils.el('div', { class: 'field' }, [Utils.el('label', {}, ['Atacante']), selA]),
                        Utils.el('div', { class: 'field' }, [Utils.el('label', {}, ['Defensor']), selB]), fightBtn);
                    panel.appendChild(row);
                    try {
                        const all = await Api.getAllPokemon();
                        const list = all.results.slice(0, 151);
                        for (const item of list) {
                            const id = item.url.split('/').filter(Boolean).pop();
                            try {
                                const p = await Api.getPokemon(id);
                                const optHtml = '<option value="' + p.id + '">' + Utils.formatId(p.id) + ' ' +
                                    Utils.translatePokemonName(p.name) + '</option>';
                                selA.innerHTML += optHtml;
                                selB.innerHTML += optHtml;
                            } catch (e) {}
                        }
                    } catch (e) {}
                    const resultHost = Utils.el('div', { style: 'margin-top:var(--sp-4)' });
                    panel.appendChild(resultHost);

                    const battle = async () => {
                        const idA = Number(selA.value);
                        const idB = Number(selB.value);
                        if (!idA || !idB || idA === idB) {
                            resultHost.innerHTML = '';
                            resultHost.appendChild(Utils.el('div', { class: 'empty-state' }, [
                                'Selecione dois Pokémon diferentes.']));
                            return;
                        }
                        resultHost.innerHTML = '';
                        resultHost.appendChild(Utils.el('div', { class: 'skeleton', style: 'height:200px' }));
                        try {
                            const [a, b] = await Promise.all([Api.getPokemon(idA), Api.getPokemon(idB)]);
                            resultHost.innerHTML = '';
                            const aStats = a.stats.reduce((acc, s) => { acc[s.stat.name] = s.base_stat; return acc },
                            {});
                            const bStats = b.stats.reduce((acc, s) => { acc[s.stat.name] = s.base_stat; return acc },
                            {});
                            const aTotal = Object.values(aStats).reduce((s, v) => s + v, 0);
                            const bTotal = Object.values(bStats).reduce((s, v) => s + v, 0);
                            const speedA = aStats.speed || 0;
                            const speedB = bStats.speed || 0;
                            const atkA = aStats.attack || 0;
                            const defB = bStats.defense || 0;
                            const spAtkA = aStats['special-attack'] || 0;
                            const spDefB = bStats['special-defense'] || 0;
                            const totalDiff = aTotal - bTotal;
                            const speedAdv = speedA > speedB ? 10 : (speedA < speedB ? -10 : 0);
                            const atkAdv = (atkA - defB) * 0.5;
                            const spAtkAdv = (spAtkA - spDefB) * 0.3;
                            let chance = 50 + totalDiff * 0.02 + speedAdv + atkAdv + spAtkAdv;
                            chance = Utils.clamp(chance, 10, 90);

                            const result = Utils.el('div', { class: 'panel', style: 'margin-top:0' });
                            const header = Utils.el('div', {
                                style: 'display:flex;align-items:center;gap:var(--sp-5);flex-wrap:wrap;justify-content:center;padding:var(--sp-3) 0'
                            });
                            const makePoke = (p, label) => {
                                const box = Utils.el('div', { style: 'text-align:center;min-width:120px' });
                                const img = Utils.el('img', { src: p.sprites?.front_default || '', alt: p.name,
                                    style: 'width:72px;height:72px;image-rendering:pixelated;object-fit:contain' });
                                const name = Utils.el('div', { style: 'font-weight:700;font-size:.85rem' }, [Utils
                                    .translatePokemonName(p.name)
                                ]);
                                const lbl = Utils.el('div', { style: 'font-size:.65rem;color:var(--text-2)' },
                                [label]);
                                box.append(img, name, lbl);
                                return box;
                            };
                            header.append(makePoke(a, 'ATACANTE'));
                            header.appendChild(Utils.el('div', { style: 'font-weight:900;font-size:1.4rem;color:var(--gold)' },
                                ['⚔️']));
                            header.appendChild(makePoke(b, 'DEFENSOR'));
                            result.appendChild(header);

                            const chanceBar = Utils.el('div', { style: 'margin:var(--sp-3) 0' });
                            chanceBar.appendChild(Utils.el('div', { style: 'font-size:.7rem;color:var(--text-2);margin-bottom:4px' },
                                ['Chance de vitória do atacante: ' + Math.round(chance) + '%']));
                            const track = Utils.el('div', {
                                style: 'height:8px;background:var(--bg-3);border-radius:6px;overflow:hidden' });
                            const fill = Utils.el('div', {
                                style: 'height:100%;width:' + chance + '%;background:var(--gold);border-radius:6px;transition:width .6s var(--ease)' });
                            track.appendChild(fill);
                            chanceBar.appendChild(track);
                            result.appendChild(chanceBar);

                            const details = Utils.el('div', { style: 'margin-top:var(--sp-3);font-size:.78rem;font-family:var(--font-mono);color:var(--text-1)' });
                            details.innerHTML =
                                `<div style="display:flex;justify-content:space-between;padding:4px 0"><span>Total Base</span><span>${aTotal} / ${bTotal}</span></div>` +
                                `<div style="display:flex;justify-content:space-between;padding:4px 0"><span>Velocidade</span><span>${speedA} / ${speedB}</span></div>` +
                                `<div style="display:flex;justify-content:space-between;padding:4px 0"><span>Ataque vs Defesa</span><span>${atkA} / ${defB}</span></div>` +
                                `<div style="display:flex;justify-content:space-between;padding:4px 0"><span>Sp. Atk vs Sp. Def</span><span>${spAtkA} / ${spDefB}</span></div>`;
                            result.appendChild(details);

                            const analysis = Utils.el('div', {
                                style: 'margin-top:var(--sp-3);padding:var(--sp-3);background:var(--bg-2);border-radius:var(--radius-md);font-size:.8rem;color:var(--text-1)'
                            });
                            let txt = '';
                            if (chance > 60) txt += '✅ ' + Utils.translatePokemonName(a.name) +
                                ' tem vantagem estatística. ';
                            else if (chance < 40) txt += '⚠️ ' + Utils.translatePokemonName(a.name) +
                                ' está em desvantagem. ';
                            else txt += '⚖️ Batalha equilibrada! ';
                            if (speedA > speedB * 1.2) txt += '⚡ ' + Utils.translatePokemonName(a.name) +
                                ' é mais rápido. ';
                            if (atkA > bStats.defense * 1.5) txt += '💥 ' + Utils.translatePokemonName(a.name) +
                                ' pode causar dano físico massivo. ';
                            analysis.textContent = txt || 'Análise concluída.';
                            result.appendChild(analysis);
                            resultHost.appendChild(result);
                        } catch (e) {
                            resultHost.innerHTML = '';
                            resultHost.appendChild(this.errorState(e));
                        }
                    };
                    fightBtn.onclick = battle;
                    const autoBattle = () => { if (selA.value && selB.value && selA.value !== selB.value) battle() };
                    selA.onchange = autoBattle;
                    selB.onchange = autoBattle;
                },

                // ─── FAVORITOS ──────────────────────────────────────────
                async renderFavorites() {
                    const main = this.main();
                    main.innerHTML = '';
                    main.appendChild(Utils.el('div', { class: 'view-head' }, [
                        Utils.el('div', {}, [
                            Utils.el('h1', { class: 'view-title', html: '⭐ <em>Favoritos</em>' }),
                            Utils.el('p', { class: 'view-sub' }, ['Seus Pokémon salvos'])
                        ])
                    ]));
                    const favs = Store.getFavorites().pokemon;
                    const grid = Utils.el('div', { class: 'grid grid-3 reveal-stagger' });
                    main.appendChild(grid);
                    if (!favs.length) {
                        grid.appendChild(Utils.el('div', { class: 'empty-state' }, [
                            'Nenhum favorito ainda. Clique na estrela nos cards para adicionar.']));
                        return;
                    }
                    grid.appendChild(this.loadingBlock(6));
                    const loaded = [];
                    for (const id of favs.slice(-24)) {
                        try { const p = await Api.getPokemon(id);
                            loaded.push(p) } catch (e) {}
                    }
                    grid.innerHTML = '';
                    if (!loaded.length) { grid.appendChild(Utils.el('div', { class: 'empty-state' }, [
                            'Erro ao carregar favoritos.'
                        ])); return }
                    loaded.forEach(p => grid.appendChild(this.pokeCard(p)));
                },

                // ─── OPEN DETAIL MODAL ──────────────────────────────────
                async openDetail(id) {
                    const overlay = document.getElementById('detailModal');
                    const body = document.getElementById('modalBody');
                    overlay.classList.add('open');
                    document.body.classList.add('modal-open');
                    document.getElementById('modalTag').textContent = 'Carregando…';
                    body.innerHTML = '';
                    body.appendChild(this.loadingBlock(1));
                    VoiceSynth.stop();
                    try {
                        const [pokemon, species] = await Promise.all([
                            Api.getPokemon(id),
                            Api.getSpecies(id).catch(() => null)
                        ]);
                        this._currentDetailPokemon = pokemon;
                        this._currentDetailSpecies = species;
                        this._renderDetail(pokemon, species);
                        history.replaceState(null, '', '#/pokedex');
                    } catch (e) {
                        body.innerHTML = '';
                        body.appendChild(this.errorState(e, () => this.openDetail(id)));
                    }
                },

                _renderDetail(pokemon, species) {
                    const body = document.getElementById('modalBody');
                    const name = Utils.translatePokemonName(pokemon.name);
                    const id = pokemon.id;
                    const sprite = pokemon.sprites?.other?.['official-artwork']?.front_default || pokemon.sprites
                        ?.front_default || '';
                    const types = pokemon.types.map(t => Utils.translateType(t.type.name));
                    const stats = pokemon.stats.reduce((acc, s) => { acc[s.stat.name] = s.base_stat; return acc }, {});
                    const abilities = pokemon.abilities.map(a => ({ name: Utils.translateAbility(a.ability.name),
                        isHidden: a.is_hidden }));

                    document.getElementById('modalTag').textContent = Utils.formatId(id);
                    document.getElementById('modalSubtitle').textContent = name;
                    body.innerHTML = '';

                    const top = Utils.el('div', { class: 'detail-top' });
                    const spriteBox = Utils.el('div', { class: 'sprite-box' });
                    const img = Utils.el('img', { src: sprite, alt: name, loading: 'lazy' });
                    spriteBox.appendChild(img);
                    const shiny = pokemon.sprites?.front_shiny;
                    if (shiny) {
                        const small = Utils.el('img', { src: shiny, alt: 'Shiny',
                            style: 'width:48px;height:48px;image-rendering:pixelated;object-fit:contain;margin-top:4px' });
                        spriteBox.appendChild(small);
                    }
                    top.appendChild(spriteBox);

                    const infoBox = Utils.el('div', { class: 'info-box' });
                    const nameRow = Utils.el('div', { class: 'name-row' });
                    nameRow.appendChild(Utils.el('h2', {}, [name]));
                    const isFav = Store.isFav(id);
                    const starBtn = Utils.el('button', { class: 'btn' + (isFav ? ' btn-gold' : ''),
                        style: 'font-size:.7rem' }, [isFav ? '★ Favorito' : '☆ Favoritar']);
                    starBtn.onclick = () => { const f = Store.toggleFav(id);
                        starBtn.textContent = f ? '★ Favorito' : '☆ Favoritar';
                        starBtn.classList.toggle('btn-gold', f);
                        Toast.show(f ? 'Favoritado!' : 'Removido', name) };
                    nameRow.appendChild(starBtn);
                    infoBox.appendChild(nameRow);

                    const meta = Utils.el('div', { class: 'meta' }, [
                        'Altura: ' + (pokemon.height / 10).toFixed(1) + 'm · Peso: ' + (pokemon.weight / 10).toFixed(
                            1) + 'kg · Exp. Base: ' + (pokemon.base_experience || '—')
                    ]);
                    infoBox.appendChild(meta);

                    const typesEl = Utils.el('div', { class: 'types' });
                    types.forEach(t => typesEl.appendChild(Utils.el('span', { class: 'type-badge type-' + t
                            .toLowerCase() }, [t])));
                    infoBox.appendChild(typesEl);

                    const abWrap = Utils.el('div', { class: 'abilities' });
                    abilities.forEach(a => {
                        const el = Utils.el('span', { class: 'ab' + (a.isHidden ? ' hidden' : '') }, [a.name + (
                            a.isHidden ? ' (Escondida)' : '')]);
                        abWrap.appendChild(el);
                    });
                    infoBox.appendChild(Utils.el('div', { style: 'margin-top:8px;font-size:.65rem;color:var(--text-2);font-family:var(--font-mono)' },
                        ['Habilidades']));
                    infoBox.appendChild(abWrap);

                    const statNames = { hp: 'HP', attack: 'Atk', defense: 'Def', 'special-attack': 'SpA',
                        'special-defense': 'SpD', speed: 'Vel' };
                    const statWrap = Utils.el('div', { style: 'margin-top:12px' });
                    for (const [key, label] of Object.entries(statNames)) {
                        const val = stats[key] || 0;
                        const row = Utils.el('div', { class: 'stat-row' });
                        row.appendChild(Utils.el('span', { class: 'stat-label' }, [label]));
                        const bar = Utils.el('div', { class: 'stat-bar' });
                        const fill = Utils.el('div', { class: 'fill' });
                        fill.style.width = Math.min(100, (val / 200) * 100) + '%';
                        bar.appendChild(fill);
                        row.appendChild(bar);
                        row.appendChild(Utils.el('span', { class: 'stat-val' }, [String(val)]));
                        statWrap.appendChild(row);
                    }
                    infoBox.appendChild(statWrap);
                    top.appendChild(infoBox);
                    body.appendChild(top);

                    // ─── TRADUÇÃO DA DESCRIÇÃO ──────────────────────────
                    if (species) {
                        const flavorContainer = Utils.el('div', { class: 'flavor-text' });
                        body.appendChild(flavorContainer);

                        // Tenta obter descrição em português
                        const ptEntry = species.flavor_text_entries?.find(e => e.language.name === 'pt' || e.language
                            .name === 'pt-BR');
                        if (ptEntry) {
                            // Já tem em pt – usa direto
                            flavorContainer.textContent = ptEntry.flavor_text.replace(/[\n\f]/g, ' ');
                        } else {
                            // Busca descrição em inglês e traduz
                            const enEntry = species.flavor_text_entries?.find(e => e.language.name === 'en');
                            if (enEntry) {
                                const originalText = enEntry.flavor_text.replace(/[\n\f]/g, ' ');
                                flavorContainer.textContent = '🔄 Traduzindo...';
                                // Traduz assincronamente
                                Utils.translateText(originalText, 'en', 'pt')
                                    .then(translated => {
                                        if (translated) {
                                            flavorContainer.textContent = translated;
                                        } else {
                                            flavorContainer.textContent =
                                                'Descrição não disponível em português.';
                                        }
                                    })
                                    .catch(() => {
                                        flavorContainer.textContent =
                                        'Descrição não disponível em português.';
                                    });
                            } else {
                                flavorContainer.textContent = 'Descrição não disponível.';
                            }
                        }

                        // Evolução
                        if (species.evolution_chain) {
                            const chainUrl = species.evolution_chain.url;
                            const chainId = chainUrl.split('/').filter(Boolean).pop();
                            this._renderEvolution(chainId, body);
                        }
                    }
                },

                async _renderEvolution(chainId, body) {
                    try {
                        const chain = await Api.getEvolutionChain(chainId);
                        const evos = [];
                        let current = chain.chain;
                        while (current) {
                            const name = current.species.name;
                            const id = current.species.url.split('/').filter(Boolean).pop();
                            evos.push({ name, id: Number(id) });
                            if (current.evolves_to && current.evolves_to.length) current = current.evolves_to[0];
                            else break;
                        }
                        if (evos.length > 1) {
                            const sec = Utils.el('div', { style: 'margin-top:var(--sp-4)' });
                            sec.appendChild(Utils.el('div', { class: 'section-title' }, ['Evolução']));
                            const chainEl = Utils.el('div', { class: 'evo-chain' });
                            for (let i = 0; i < evos.length; i++) {
                                const item = evos[i];
                                const box = Utils.el('div', { class: 'evo-item' });
                                try {
                                    const p = await Api.getPokemon(item.id);
                                    const img = Utils.el('img', { src: p.sprites?.front_default || '',
                                    alt: item.name, loading: 'lazy' });
                                    box.appendChild(img);
                                } catch (e) {}
                                box.appendChild(Utils.el('span', { class: 'evo-name' }, [Utils.translatePokemonName(
                                    item.name)]));
                                chainEl.appendChild(box);
                                if (i < evos.length - 1) chainEl.appendChild(Utils.el('span', { class: 'evo-arrow' },
                                    ['→']));
                            }
                            sec.appendChild(chainEl);
                            body.appendChild(sec);
                        }
                    } catch (e) {}
                },
            };

            // ─── APP INIT ──────────────────────────────────────────────
            function init() {
                Theme.init();

                VoiceSynth.init(document.getElementById('voiceBtn'));

                Router.on('/', () => Views.renderDashboard());
                Router.on('/pokedex', () => Views.renderPokedex());
                Router.on('/tipos', () => Views.renderTypeCalculator());
                Router.on('/times', () => Views.renderTeamBuilder());
                Router.on('/batalha', () => Views.renderBattle());
                Router.on('/favoritos', () => Views.renderFavorites());
                Router.init();

                document.getElementById('voiceBtn').onclick = () => {
                    if (VoiceSynth.isSpeaking) {
                        VoiceSynth.stop();
                        return;
                    }
                    if (Views._currentDetailPokemon) {
                        VoiceSynth.speak(Views._currentDetailPokemon, Views._currentDetailSpecies);
                    } else {
                        Toast.show('Aguardando', 'Abra um Pokémon primeiro para ouvir sua descrição.');
                    }
                };

                document.getElementById('pokedexBlueBtn').onclick = () => {
                    location.hash = '#/';
                    VoiceSynth.stop();
                    Toast.show('🏠 Dashboard', 'Retornando ao painel principal.', { duration: 2000 });
                };

                document.getElementById('themeBtn').onclick = Theme.toggle;
                document.getElementById('refreshBtn').onclick = () => {
                    Api.setStatus('recarregando…');
                    Store.set('cache:', null);
                    Router.resolve();
                    Toast.show('Atualizado', 'Dados recarregados da PokéAPI.');
                };

                const hb = document.getElementById('hamburgerBtn');
                const nav = document.getElementById('mainNav');
                hb.onclick = (e) => { e.stopPropagation();
                    const open = !nav.classList.contains('open');
                    nav.classList.toggle('open', open);
                    hb.classList.toggle('open', open);
                    hb.setAttribute('aria-expanded', open ? 'true' : 'false') };
                document.addEventListener('click', (e) => {
                    if (!nav.classList.contains('open')) return;
                    if (e.target.closest('#mainNav') || e.target.closest('#hamburgerBtn')) return;
                    nav.classList.remove('open');
                    hb.classList.remove('open');
                    hb.setAttribute('aria-expanded', 'false');
                });
                window.addEventListener('resize', Utils.debounce(() => { if (window.innerWidth > 860) { nav.classList
                            .remove('open');
                        hb.classList.remove('open');
                        hb.setAttribute('aria-expanded', 'false') } }, 150));

                document.getElementById('modalCloseBtn').onclick = () => {
                    document.getElementById('detailModal').classList.remove('open');
                    document.body.classList.remove('modal-open');
                    VoiceSynth.stop();
                };
                document.getElementById('detailModal').addEventListener('click', (e) => {
                    if (e.target.id === 'detailModal') {
                        document.getElementById('detailModal').classList.remove('open');
                        document.body.classList.remove('modal-open');
                        VoiceSynth.stop();
                    }
                });
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        document.getElementById('detailModal').classList.remove('open');
                        document.body.classList.remove('modal-open');
                        document.getElementById('searchOverlay').classList.remove('open');
                        VoiceSynth.stop();
                    }
                });

                const searchOverlay = document.getElementById('searchOverlay');
                const searchInput = document.getElementById('searchInput');
                const searchResults = document.getElementById('searchResults');
                document.getElementById('searchBtn').onclick = () => {
                    searchOverlay.classList.add('open');
                    searchInput.value = '';
                    searchResults.innerHTML = '';
                    searchInput.focus();
                };
                document.getElementById('searchCloseBtn').onclick = () => searchOverlay.classList.remove('open');
                searchOverlay.addEventListener('click', (e) => { if (e.target === searchOverlay) searchOverlay.classList
                        .remove('open') });

                let searchTimeout = null;
                searchInput.addEventListener('input', () => {
                    clearTimeout(searchTimeout);
                    const q = searchInput.value.trim();
                    if (!q) { searchResults.innerHTML = ''; return }
                    searchResults.innerHTML =
                        '<div style="padding:var(--sp-3);color:var(--text-2)">Buscando…</div>';
                    searchTimeout = setTimeout(async () => {
                        try {
                            const list = await Api.search(q);
                            searchResults.innerHTML = '';
                            if (!list.length) { searchResults.appendChild(Utils.el('div', { style: 'padding:var(--sp-3);color:var(--text-2)' },
                                    ['Nenhum resultado.'])); return }
                            for (const p of list) {
                                const item = Utils.el('div', { class: 'sr-item' });
                                const img = Utils.el('img', { src: p.sprites?.front_default || '',
                                alt: p.name });
                                const name = Utils.el('span', { class: 'sr-name' }, [Utils.translatePokemonName(p
                                    .name)]);
                                const meta = Utils.el('span', { class: 'sr-meta' }, [Utils.formatId(p
                                    .id)]);
                                item.onclick = () => {
                                    searchOverlay.classList.remove('open');
                                    Views.openDetail(p.id);
                                };
                                item.append(img, name, meta);
                                searchResults.appendChild(item);
                            }
                        } catch (e) {
                            searchResults.innerHTML = '';
                            searchResults.appendChild(Utils.el('div', { style: 'padding:var(--sp-3);color:var(--text-2)' },
                                ['Erro na busca.']));
                        }
                    }, 400);
                });

                Api.setStatus('pronto');
                Toast.show('Bem-vindo ao PokéVerse AI!', 'Explore, compare, batalhe e monte times com a PokéAPI.', { duration: 5000 });
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
